<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Closed-Won Deals — Bubble View</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root {
    --bg-0: #0b1020;
    --bg-1: #141a35;
    --ink: #e7ecff;
    --ink-dim: #8a93b8;
    --accent: #6ea8ff;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at top, var(--bg-1), var(--bg-0) 60%);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow-x: hidden;
  }
  header {
    padding: 28px 40px 8px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 16px;
  }
  h1 {
    margin: 0;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, #fff, #9bb8ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .summary {
    color: var(--ink-dim);
    font-size: 13px;
    text-align: right;
  }
  .summary strong { color: var(--ink); font-size: 22px; font-weight: 700; }
  .tabs {
    display: flex;
    gap: 8px;
    padding: 16px 40px 0;
    border-bottom: 1px solid var(--border);
    align-items: flex-end;
  }
  .mode-toggle {
    margin-left: auto;
    display: flex;
    gap: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    margin-bottom: 6px;
  }
  .mode-btn {
    background: transparent;
    color: var(--ink-dim);
    border: none;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 6px;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
  }
  .mode-btn:hover { color: var(--ink); }
  .mode-btn.active {
    background: rgba(110, 168, 255, 0.18);
    color: var(--ink);
  }
  /* List view */
  #list-view {
    display: none;
    padding: 8px 40px 60px;
    max-height: calc(100vh - 220px);
    min-height: 600px;
    overflow-y: auto;
  }
  .list-group {
    margin-top: 22px;
  }
  .list-group-header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding: 12px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 6px;
  }
  .list-group-color {
    width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  }
  .list-group-name {
    font-size: 14px; font-weight: 700; color: var(--ink);
    text-transform: uppercase; letter-spacing: 0.8px;
  }
  .list-group-meta {
    color: var(--ink-dim); font-size: 12px; margin-left: auto;
  }
  .list-group-meta strong { color: #8ed1ff; font-size: 14px; }
  .list-row {
    display: grid;
    grid-template-columns: 28px 1fr 80px 100px;
    align-items: center;
    gap: 12px;
    padding: 8px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 13px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .list-row:hover { background: rgba(255,255,255,0.03); }
  .list-rank { color: var(--ink-dim); font-size: 11px; text-align: right; }
  .list-company { color: var(--ink); font-weight: 500; }
  .list-deals { color: var(--ink-dim); font-size: 12px; text-align: right; }
  .list-value { color: #8ed1ff; font-weight: 700; text-align: right; }
  .list-deals-detail {
    display: none;
    padding: 6px 14px 12px 60px;
    color: var(--ink-dim);
    font-size: 11px;
    line-height: 1.7;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .list-row.expanded + .list-deals-detail { display: block; }
  .list-deals-detail .deal {
    display: grid;
    grid-template-columns: 80px 1fr 80px;
    gap: 12px;
    padding: 2px 0;
  }
  .deal-type {
    color: #8ed1ff; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .tab {
    background: transparent;
    color: var(--ink-dim);
    border: 1px solid transparent;
    border-bottom: none;
    padding: 12px 22px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 10px 10px 0 0;
    transition: all 0.2s;
    font-family: inherit;
  }
  .tab:hover { color: var(--ink); background: var(--card); }
  .tab.active {
    color: var(--ink);
    background: var(--card);
    border-color: var(--border);
    border-bottom-color: var(--bg-0);
    position: relative;
    top: 1px;
  }
  .legend {
    display: flex; flex-wrap: wrap; gap: 14px;
    padding: 16px 40px;
    font-size: 12px;
    color: var(--ink-dim);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  #chart {
    width: 100%;
    height: calc(100vh - 220px);
    min-height: 600px;
    display: block;
  }
  .bubble-group-label {
    fill: rgba(255,255,255,0.95);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    pointer-events: none;
    text-anchor: middle;
  }
  .bubble-group-sub {
    fill: rgba(255,255,255,0.65);
    font-weight: 500;
    pointer-events: none;
    text-anchor: middle;
  }
  .label-pill {
    pointer-events: none;
  }
  .bubble-label {
    fill: white;
    font-weight: 600;
    pointer-events: none;
    text-anchor: middle;
  }
  .bubble-sub {
    fill: rgba(255,255,255,0.75);
    font-weight: 400;
    pointer-events: none;
    text-anchor: middle;
  }
  circle.bubble {
    cursor: pointer;
    transition: stroke-width 0.15s, opacity 0.2s;
    stroke: rgba(255,255,255,0.15);
    stroke-width: 1;
  }
  circle.bubble:hover {
    stroke: white;
    stroke-width: 2.5;
  }
  circle.group-bubble {
    fill: none;
    stroke: rgba(255,255,255,0.18);
    stroke-width: 1.5;
    stroke-dasharray: 4 6;
  }
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(10, 14, 30, 0.95);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--ink);
    min-width: 200px;
    max-width: 320px;
    backdrop-filter: blur(10px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
  }
  #tooltip .t-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  #tooltip .t-meta { color: var(--ink-dim); margin-bottom: 8px; }
  #tooltip .t-amount { color: #8ed1ff; font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  #tooltip .t-deals { color: var(--ink-dim); font-size: 11px; line-height: 1.5; max-height: 140px; overflow: hidden; }
  #tooltip .t-deals div { padding: 2px 0; border-top: 1px dashed rgba(255,255,255,0.08); }
  #tooltip .t-deals div:first-child { border-top: none; }
</style>
</head>

<header>
  <div>

</div>
<div id="legend" class="legend"></div>
<svg id="chart"></svg>
<div id="list-view"></div>

// ========================================================

const fmt = d3.format("$,.0f");
const fmtCompact = d => {
  if (d >= 1e6) return "$" + (d/1e6).toFixed(d>=1e7?0:1) + "M";
  if (d >= 1e3) return "$" + Math.round(d/1e3) + "k";
  return "$" + d;
};

const tooltip = d3.select("#tooltip");
const svg = d3.select("#chart");
const listEl = document.getElementById("list-view");
const chartEl = document.getElementById("chart");
let currentView = "industry";
let currentMode = "bubble";

// color palettes per group
const PALETTES = {
  industry: d3.scaleOrdinal()
    .range(["#6ea8ff","#ff8fb2","#ffd166","#8be9c1","#c79bff","#ff9b6e","#7fdcff","#ffe08a"]),
  location: d3.scaleOrdinal()
    .range(["#6ea8ff","#ff8fb2","#8be9c1","#ffd166"]),
  product: d3.scaleOrdinal()
    .range(["#6ea8ff","#ff8fb2","#ffd166","#8be9c1","#c79bff","#ff9b6e","#7fdcff","#ffe08a"]),
};

function render(view) {
  currentView = view;
  if (currentMode === "list") {
    chartEl.style.display = "none";
    listEl.style.display = "block";
    renderList(view);
    return;
  }
  chartEl.style.display = "block";
  listEl.style.display = "none";
  const items = DATA[view];

  // group totals
  const groups = d3.rollups(items, v => d3.sum(v, d => d.value), d => d.group)
    .map(([name, total]) => ({name, total}))
    .sort((a,b) => b.total - a.total);

  const color = PALETTES[view].domain(groups.map(g => g.name));

  // render legend
  const legend = d3.select("#legend");
  legend.html("");
  groups.forEach(g => {
    const item = legend.append("div").attr("class","legend-item");
    item.append("div").attr("class","legend-dot").style("background", color(g.name));
    item.append("span").text(`${g.name} · ${fmtCompact(g.total)}`);
  });

  // size svg
  const W = svg.node().clientWidth || window.innerWidth;
  const H = svg.node().clientHeight || (window.innerHeight - 220);
  svg.attr("viewBox", `0 0 ${W} ${H}`);
  svg.html("");

  // ---- Layout: pack each group's bubbles into a sub-pack inside a parent layout ----
  // Build hierarchy: root -> groups -> companies
  const root = d3.hierarchy({
    name: "root",
    children: groups.map(g => ({
      name: g.name,
      total: g.total,
      children: items.filter(it => it.group === g.name)
        .map(it => ({ ...it, leaf: true }))
    }))
  })
  .sum(d => d.leaf ? Math.max(d.value, 1000) : 0)
  .sort((a,b) => b.value - a.value);

  // Bigger cluster padding so labels (placed in the gap ABOVE each cluster ring)
  // have guaranteed empty whitespace and never overlap bubbles or neighbors.
  const CLUSTER_PAD = 64;
  const TOP_PAD = 44;
  const pack = d3.pack()
    .size([W - 60, H - 60 - TOP_PAD])
    .padding(d => d.depth === 0 ? CLUSTER_PAD : 3);

  pack(root);

  const g = svg.append("g").attr("transform", `translate(30, ${30 + TOP_PAD})`);

  // group rings
  g.selectAll("circle.group-bubble")
    .data(root.children)
    .join("circle")
    .attr("class","group-bubble")
    .attr("cx", d => d.x)
    .attr("cy", d => d.y)
    .attr("r", d => d.r);

  // Font auto-fits cluster diameter so long titles like "Transportation & Logistics" never overflow.
  const fitFontSize = (text, maxWidth) => {
    let fs = 15;
    while (fs > 9 && text.length * fs * 0.62 > maxWidth) fs--;
    return fs;
  };

  // Place labels OUTSIDE the cluster, just above the ring. The CLUSTER_PAD reserves
  // ~32px of empty space above each ring, which is exactly where the label lives.
  const labelGroup = g.selectAll("g.cluster-label")
    .data(root.children, d => d.data.name)
    .join("g")
    .attr("class","cluster-label")
    .attr("transform", d => `translate(${d.x}, ${d.y - d.r - 24})`);

  // background pill so text stays readable against any bubble color underneath
  labelGroup.each(function(d) {
    const sel = d3.select(this);
    const fs = fitFontSize(d.data.name.toUpperCase(), Math.max(d.r * 2.4, 140));
    const subText = `${fmtCompact(d.data.total)} · ${d.children ? d.children.length : 0} accounts`;
    const wName = d.data.name.length * fs * 0.62 + 18;
    const wSub = subText.length * (fs - 3) * 0.6 + 18;
    const pillW = Math.max(wName, wSub);
    sel.append("rect")
      .attr("class","label-pill")
      .attr("x", -pillW/2).attr("y", -fs - 2)
      .attr("width", pillW).attr("height", fs + 22)
      .attr("rx", 6).attr("ry", 6)
      .attr("fill", "rgba(11,16,32,0.85)");
    sel.append("text")
      .attr("class","bubble-group-label")
      .attr("y", 0)
      .style("font-size", fs + "px")
      .text(d.data.name);
    sel.append("text")
      .attr("class","bubble-group-sub")
      .attr("y", fs + 4)
      .style("font-size", Math.max(10, fs - 3) + "px")
      .text(subText);
  });

  // bubbles (leaves)
  const leaves = root.leaves();
  const bubble = g.selectAll("g.bubble-node")
    .data(leaves)
    .join("g")
    .attr("class","bubble-node")
    .attr("transform", d => `translate(${d.x},${d.y})`);

  bubble.append("circle")
    .attr("class","bubble")
    .attr("r", d => d.r)
    .attr("fill", d => {
      const c = d3.color(color(d.parent.data.name));
      return c.formatRgb();
    })
    .attr("opacity", 0.85)
    .on("mousemove", (event, d) => {
      const dealsHtml = d.data.deals
        .sort((a,b) => b.amount - a.amount)
        .slice(0, 6)
        .map(deal => `<div>${deal.type ? `<span style="color:#8ed1ff">[${deal.type}]</span> ` : ''}${deal.name} · ${fmtCompact(deal.amount)}</div>`)
        .join("");
      const more = d.data.deals.length > 6 ? `<div style="color:var(--ink-dim);font-style:italic;margin-top:4px;">+${d.data.deals.length-6} more</div>` : "";
      tooltip.html(`
        <div class="t-title">${d.data.company}</div>
        <div class="t-meta">${d.parent.data.name} · ${d.data.deals.length} deal${d.data.deals.length>1?'s':''}</div>
        <div class="t-amount">${fmt(d.data.value)}</div>
        <div class="t-deals">${dealsHtml}${more}</div>
      `).style("opacity",1)
        .style("left", Math.min(event.clientX + 14, window.innerWidth - 340) + "px")
        .style("top", Math.min(event.clientY + 14, window.innerHeight - 240) + "px");
    })
    .on("mouseleave", () => tooltip.style("opacity",0));

  // bubble labels (only if circle big enough)
  bubble.filter(d => d.r > 26)
    .append("text")
    .attr("class","bubble-label")
    .attr("dy", d => d.r > 40 ? "-0.2em" : "0.35em")
    .style("font-size", d => Math.min(d.r/3.5, 14) + "px")
    .text(d => {
      const name = d.data.company;
      const max = Math.floor(d.r/4);
      return name.length > max ? name.slice(0, max-1) + "…" : name;
    });

  bubble.filter(d => d.r > 40)
    .append("text")
    .attr("class","bubble-sub")
    .attr("dy", "1.0em")
    .style("font-size", d => Math.min(d.r/4.5, 12) + "px")
    .text(d => fmtCompact(d.data.value));
}

// tab handling
d3.selectAll(".tab").on("click", function() {
  d3.selectAll(".tab").classed("active", false);
  d3.select(this).classed("active", true);
  render(this.dataset.view);
});

// mode toggle (Bubbles / List)
d3.selectAll(".mode-btn").on("click", function() {
  d3.selectAll(".mode-btn").classed("active", false);
  d3.select(this).classed("active", true);
  currentMode = this.dataset.mode;
  render(currentView);
});

// render the deals as a grouped list
function renderList(view) {
  const items = DATA[view];
  const groups = d3.rollups(items, v => d3.sum(v, d => d.value), d => d.group)
    .map(([name, total]) => ({name, total}))
    .sort((a,b) => b.total - a.total);
  const color = PALETTES[view].domain(groups.map(g => g.name));

  let html = "";
  groups.forEach(g => {
    const groupItems = items
      .filter(it => it.group === g.name)
      .sort((a,b) => b.value - a.value);
    const dealCount = groupItems.reduce((s,c) => s + c.deals.length, 0);
    html += `<div class="list-group">
      <div class="list-group-header">
        <div class="list-group-color" style="background:${color(g.name)}"></div>
        <div class="list-group-name">${g.name}</div>
        <div class="list-group-meta">${groupItems.length} accounts · ${dealCount} deals · <strong>${fmtCompact(g.total)}</strong></div>
      </div>`;
    groupItems.forEach((c, i) => {
      const dealsHtml = c.deals
        .sort((a,b) => b.amount - a.amount)
        .map(deal => `<div class="deal"><div class="deal-type">${deal.type || ''}</div><div>${deal.name}</div><div style="text-align:right;color:#8ed1ff;">${fmtCompact(deal.amount)}</div></div>`)
        .join("");
      html += `<div class="list-row" onclick="this.classList.toggle('expanded')">
        <div class="list-rank">${i+1}</div>
        <div class="list-company">${c.company}</div>
        <div class="list-deals">${c.deals.length} deal${c.deals.length>1?'s':''}</div>
        <div class="list-value">${fmtCompact(c.value)}</div>
      </div>
      <div class="list-deals-detail">${dealsHtml}</div>`;
    });
    html += `</div>`;
  });
  listEl.innerHTML = html;
}

// initial summary
const totalAll = DATA.industry.reduce((s,d) => s + d.value, 0);
const totalDeals = DATA.industry.reduce((s,d) => s + d.deals.length, 0);
d3.select("#total-summary").html(`<strong>${fmtCompact(totalAll)}</strong> across <strong>${totalDeals}</strong> deals`);

// render
render("industry");
window.addEventListener("resize", () => render(currentView));
</script>
